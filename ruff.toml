line-length = 120
target-version = "py311"
exclude = ["venv", "cache", "data", "logs", "transcripts", "reports", ".git"]

[lint]
select = ["E", "F", "W"]
ignore = [
    "E501",  # line too long — formatter handles this
    "F401",  # unused imports (conditional/star imports throughout)
    "W291",  # trailing whitespace
    "W293",  # whitespace before colon
]

[lint.per-file-ignores]
"modules/__init__.py" = ["F401"]

[format]
quote-style = "double"
indent-style = "space"
